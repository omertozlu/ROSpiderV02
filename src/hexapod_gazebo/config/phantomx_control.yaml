controller_manager:
  ros__parameters:
    update_rate: 1000  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    hexapod_joint_group_controller:
      type: position_controllers/JointGroupPositionController

hexapod_joint_group_controller:
  ros__parameters:
    joints:
      - coxa_joint_RF
      - femur_joint_RF
      - tibia_joint_RF
      - coxa_joint_LF
      - femur_joint_LF
      - tibia_joint_LF
      - coxa_joint_RM
      - femur_joint_RM
      - tibia_joint_RM
      - coxa_joint_LM
      - femur_joint_LM
      - tibia_joint_LM
      - coxa_joint_RR
      - femur_joint_RR
      - tibia_joint_RR
      - coxa_joint_LR
      - femur_joint_LR
      - tibia_joint_LR
    
    interface_name: position

    # GÜNCELLENMİŞ "TOK" AYARLAR
    # Velocity 2.0'a düştüğü için P'yi artırıp robotu dikleştirdik.
    # D'yi artırıp yalpalamayı kestik.
    gains:
      coxa_joint_RF: {p: 250.0, i: 0.1, d: 15.0}
      femur_joint_RF: {p: 250.0, i: 0.1, d: 15.0}
      tibia_joint_RF: {p: 250.0, i: 0.1, d: 15.0}
      coxa_joint_LF: {p: 250.0, i: 0.1, d: 15.0}
      femur_joint_LF: {p: 250.0, i: 0.1, d: 15.0}
      tibia_joint_LF: {p: 250.0, i: 0.1, d: 15.0}
      coxa_joint_RM: {p: 250.0, i: 0.1, d: 15.0}
      femur_joint_RM: {p: 250.0, i: 0.1, d: 15.0}
      tibia_joint_RM: {p: 250.0, i: 0.1, d: 15.0}
      coxa_joint_LM: {p: 250.0, i: 0.1, d: 15.0}
      femur_joint_LM: {p: 250.0, i: 0.1, d: 15.0}
      tibia_joint_LM: {p: 250.0, i: 0.1, d: 15.0}
      coxa_joint_RR: {p: 250.0, i: 0.1, d: 15.0}
      femur_joint_RR: {p: 250.0, i: 0.1, d: 15.0}
      tibia_joint_RR: {p: 250.0, i: 0.1, d: 15.0}
      coxa_joint_LR: {p: 250.0, i: 0.1, d: 15.0}
      femur_joint_LR: {p: 250.0, i: 0.1, d: 15.0}
      tibia_joint_LR: {p: 250.0, i: 0.1, d: 15.0}